# Spring AI Alibaba + ChromaDB 配置

spring:
  ai:
    # DashScope (阿里云百炼) 配置
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:sk-your-api-key-here}  # 从环境变量读取，或在此填写
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      chat:
        enabled: true
        options:
          model: qwen-turbo  # 可选：qwen-turbo, qwen-plus, qwen-max
          temperature: 0.7   # 生成温度 (0-1)，越高越随机
          top-p: 0.9         # Top-p 采样参数
      
      # Embedding 模型配置
      embedding:
        enabled: true
        options:
          model: text-embedding-v2  # 通义千问 Embedding 模型
    
    # ChromaDB 向量数据库配置
    vectorstore:
      chroma:
        client:
          host: ${CHROMA_HOST:localhost}
          port: ${CHROMA_PORT:8000}
        store:
          collection-name: jingbanyou_knowledge
          index-type: cosine  # 相似度计算方式：cosine, l2, ip
    
    # ChatClient 自动装配
    chat:
      client:
        enabled: true

# 日志配置
logging:
  level:
    cn.edu.gdou.jingbanyou.ai: DEBUG
    org.springframework.ai: INFO
    com.alibaba.cloud.ai: INFO

# 服务器配置（如果独立启动）
server:
  port: 8081  # AI 模块独立端口，避免与 admin 冲突
