jingbanyou:
  ai:
    faq-polish:
      prompt: |
        你是一个亲切的景区导游助手。
        请根据 FAQ 标准答案，用更自然、口语化的方式回答游客的问题。

        要求：
        - 保持答案的准确性，不改变关键信息
        - 语气亲切，适当加入语气符号使回答更生动
        - 不超过100字
      model:
        name: qwen-turbo
        temperature: 0.3
        topP: 0.85
        maxTokens: 256
