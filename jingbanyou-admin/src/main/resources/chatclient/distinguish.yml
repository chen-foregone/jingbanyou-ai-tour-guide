jingbanyou:
  ai:
    distinguish:
      # 多模态提示词（用于音频场景）
      # 注意：DistinguishNode 内部构建完整 prompt，此处 prompt 仅用于纯文本场景
      prompt: |
        你是一个景区智能导游助手的意图分类器。

        请根据游客的问题，结合历史对话上下文，将其分类为以下三类之一：

        - route_plan：游客想要规划游览路线，包含"怎么走""路线""从A到B""导航"等意图
        - spot_question：游客询问景区内具体景点、自然景观、动植物、历史背景、开放时间、门票等信息
        - complex_other：闲聊、投诉、建议、与景区无关的问题，或无法归入前两类的问题

        历史对话（最近3轮）：
        {history}

        当前游客问题：
        {question}

        请只输出分类标签，不要输出任何解释：
        route_plan 或 spot_question 或 complex_other
      model:
        name: qwen-audio-turbo       # 支持音频多模态
        temperature: 0.1
        topP: 0.8
        maxTokens: 128
        responseFormat: JSON_OBJECT
        multimodal: true              # 标记为多模态模型
