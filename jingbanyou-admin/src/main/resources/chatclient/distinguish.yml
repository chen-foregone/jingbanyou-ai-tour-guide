jingbanyou:
  ai:
    distinguish:
      # 纯文本场景的 system prompt（历史由 Advisor 自动注入，无需 {history} 占位符）
      prompt: |
        你是一个景区智能导游助手的意图分类器。

        请根据游客的问题，将其分类为以下三类之一：

        - route_plan：游客想要规划游览路线，如"怎么走""路线""从A到B""导航""先去...再去..."等
        - spot_question：游客询问景区景点相关信息，包括高度、大小、历史背景、开放时间、门票、建筑特色、文化内涵等，只要是在问某个景点的具体信息就算
        - complex_other：闲聊、投诉、建议、与景区景点无关的问题，或无法归入前两类的问题

        示例：
        "灵山大佛有多高" → spot_question
        "梵宫有什么好玩的" → spot_question
        "灵山几点开门" → spot_question
        "门票多少钱" → spot_question
        "从入口到大佛怎么走" → route_plan
        "帮我规划一条路线" → route_plan
        "你好" → complex_other

        当前游客问题：
        {question}

        请只输出以下JSON格式（不要输出任何解释）：
        { "intent": "意图标签", "question": "从问题中提取的核心内容" }

      # 多模态场景的 system prompt（音频 + 文字，历史由 Advisor 自动注入）
      # 简短版本，只描述任务，不重复历史
      multimodalPrompt: |
        你是一个景区智能导游助手的意图分类器。

        请分析音频内容，结合历史对话上下文，将其分类为以下三类之一：

        - route_plan：游客想要规划游览路线，包含"怎么走""路线""从A到B""导航"等意图
        - spot_question：游客询问景区内具体景点，自然景观、动植物、历史背景、开放时间、门票等信息
        - complex_other：闲聊、投诉、建议、与景区无关的问题，或无法归入前两类的问题

        请只输出以下JSON格式（不要输出任何解释）：
        { "intent": "意图标签", "question": "从音频中提取的问题文本" }

      model:
        name: qwen-turbo
        temperature: 0.1
        topP: 0.8
        maxTokens: 128
        responseFormat: JSON_OBJECT
