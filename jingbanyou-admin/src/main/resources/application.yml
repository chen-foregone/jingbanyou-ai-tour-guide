# 项目相关配置
ruoyi:
  # 名称
  name: RuoYi
  # 版本
  version: 3.9.2
  # 版权年份
  copyrightYear: 2026
  # 文件路径 示例（ Windows配置D:/ruoyi/uploadPath，Linux配置 /home/ruoyi/uploadPath）
  profile: D:/ruoyi/uploadPath
  # 获取ip地址开关
  addressEnabled: false
  # 验证码类型 math 数字计算 char 字符验证
  captchaType: math

# 开发环境配置
server:
  # 服务器的HTTP端口，默认为8080
  port: 8081
  servlet:
    # 应用的访问路径
    context-path: /
  tomcat:
    # tomcat的URI编码
    uri-encoding: UTF-8
    # 连接数满后的排队数，默认为100
    accept-count: 1000
    threads:
      # tomcat最大线程数，默认为200
      max: 800
      # Tomcat启动初始化的线程数，默认值10
      min-spare: 100

# 日志配置
logging:
  level:
    cn.edu.gdou.jingbanyou: debug
    org.springframework: warn

# 用户配置
user:
  password:
    # 密码最大错误次数
    maxRetryCount: 5
    # 密码锁定时间（默认10分钟）
    lockTime: 10

# Spring配置
spring:
  main:
    allow-bean-definition-overriding: true
  # 资源信息
  messages:
    # 国际化资源文件路径
    basename: i18n/messages
  profiles:
    active: druid
  # 文件上传
  servlet:
    multipart:
      # 单个文件大小
      max-file-size: 10MB
      # 设置总上传的文件大小
      max-request-size: 20MB
  config:
    import: classpath:chatclient/scenic-knowledge.yml,classpath:chatclient/route-polish.yml,classpath:chatclient/profile-update.yml,classpath:chatclient/map-route-invoker.yml,classpath:chatclient/general-chat.yml,classpath:chatclient/faq-polish.yml,classpath:chatclient/distinguish.yml
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:sk-25a0e981c714438e85fe067faaf64295}
      chat:
        options:
          model: qwen-turbo
          temperature: 0.7
          top-p: 0.9
        memory:
          repository:
            redis:
              host: localhost
              port: 6380
              key-prefix: "chat:memory:"
              time-to-live: "24h"
      embedding:
        enabled: true
        options:
          model: text-embedding-v2
      mcp:
        client:
          stdio:
            servers-configuration: classpath:/mcp-servers-config.json # 指定 MCP 服务的配置文件路径
          toolcallback:
            enabled: true # 开启 MCP 客户端的工具回调（Tool Callback）功能
      audio:
        speech:
          # 使用通义语音合成模型 cosyvoice-v1
          model: cosyvoice-v1
          # 默认音色（可被 DigitalHumanConfig.ttsVoiceCode 覆盖）
          options:
            voice: longxia
            response-format: mp3
            speed: 1.0
            sample-rate: 22050

  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
  # 服务模块
  devtools:
    restart:
      # 热部署开关
      enabled: true
  data:
    # redis 配置
    redis:
      # 地址
      host: localhost
      # 端口，默认为6379
      port: 6379
      # 数据库索引
      database: 0
      # 密码
      password:
      # 连接超时时间
      timeout: 10s
      lettuce:
        pool:
          # 连接池中的最小空闲连接
          min-idle: 0
          # 连接池中的最大空闲连接
          max-idle: 8
          # 连接池的最大数据库连接数
          max-active: 8
          # #连接池最大阻塞等待时间（使用负值表示没有限制）
          max-wait: -1ms

# Redis Stack 向量检索（独立端口 6380，与 Spring Data Redis 分离）
redis:
  vectorstore:
    host: localhost
    port: 6380

# token配置
token:
  # 令牌自定义标识
  header: Authorization
  # 令牌密钥
  secret: abcdefghijklmnopqrstuvwxyz
  # 令牌有效期（默认30分钟）
  expireTime: 30

# MyBatis配置
mybatis:
  # 搜索指定包别名
  typeAliasesPackage: cn.edu.gdou.jingbanyou.**.domain
  # 配置mapper的扫描，找到所有的mapper.xml映射文件
  mapperLocations: classpath*:mapper/**/*Mapper.xml
  # 加载全局的配置文件
  configLocation: classpath:mybatis/mybatis-config.xml

# MyBatis-Plus配置（与MyBatis共存，manage模块使用）
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*Mapper.xml
  type-aliases-package: cn.edu.gdou.jingbanyou.**.domain
  global-config:
    db-config:
      id-type: auto

# PageHelper分页插件
pagehelper:
  helperDialect: mysql
  supportMethodsArguments: true
  params: count=countSql

# Springdoc配置
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
  group-configs:
    - group: 'default'
      display-name: '测试模块'
      paths-to-match: '/**'
      packages-to-scan: cn.edu.gdou.jingbanyou.web.controller.tool

# 防盗链配置
referer:
  # 防盗链开关
  enabled: false
  # 允许的域名列表
  allowed-domains: localhost,127.0.0.1,ruoyi.vip,www.ruoyi.vip

# 防止XSS攻击
xss:
  # 过滤开关
  enabled: true
  # 排除链接（多个用逗号分隔）
  excludes: /system/notice
  # 匹配链接
  urlPatterns: /system/*,/monitor/*,/tool/*

# dromara 文件存储（阿里云 OSS）
dromara:
  x-file-storage:
    # 默认存储平台
    default-platform: aliyun-oss-1
    # 缩略图后缀
    thumbnail-suffix: ".min.jpg"
    # 阿里云 OSS 配置
    aliyun-oss:
      - platform: aliyun-oss-1
        # OSS 内网接入点（Java SDK 自动识别并优先使用同地域内网地址）
        endpoint: oss-cn-beijing.aliyuncs.com
        # 访问凭证（从环境变量读取，保证密钥安全）
        access-key: ${ALIYUN_OSS_ACCESS_KEY:}
        secret-key: ${ALIYUN_OSS_SECRET_KEY:}
        # Bucket 配置
        bucket-name: java-ai-c-z-h
        # 访问域名（用于拼接文件 URL）
        domain: https://java-ai-c-z-h.oss-cn-beijing.aliyuncs.com
        # OSS 内网 endpoint（Java SDK 会根据 bucket 地域自动选择）
        internal: false
        # 文件基础路径
        base-path: dkd-images/

