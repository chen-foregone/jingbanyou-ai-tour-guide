# 项目相关配置
ruoyi:
  # 名称
  name: RuoYi
  # 版本
  version: 3.9.2
  # 版权年份
  copyrightYear: 2026
  # 文件路径 示例（ Windows配置D:/ruoyi/uploadPath，Linux配置 /home/ruoyi/uploadPath）
  profile: D:/ruoyi/uploadPath
  # 获取ip地址开关
  addressEnabled: false
  # 验证码类型 math 数字计算 char 字符验证
  captchaType: math

# 开发环境配置
server:
  # 服务器的HTTP端口，默认为8080
  port: 9091
  # 监听所有网卡，允许内网其他机器访问
  address: 0.0.0.0
  servlet:
    # 应用的访问路径
    context-path: /
  tomcat:
    # tomcat的URI编码
    uri-encoding: UTF-8
    # 连接数满后的排队数，默认为100
    accept-count: 1000
    threads:
      # tomcat最大线程数，默认为200
      max: 800
      # Tomcat启动初始化的线程数，默认值10
      min-spare: 100

# 日志配置
logging:
  level:
    cn.edu.gdou.jingbanyou: debug
    org.springframework: warn

# 用户配置
user:
  password:
    # 密码最大错误次数
    maxRetryCount: 5
    # 密码锁定时间（默认10分钟）
    lockTime: 10

# Spring配置
spring:
  main:
    allow-bean-definition-overriding: true
  # 资源信息
  messages:
    # 国际化资源文件路径
    basename: i18n/messages
  profiles:
    active: druid
  codec:
    max-in-memory-size: 10MB
  # 文件上传
  servlet:
    multipart:
      # 单个文件大小
      max-file-size: 10MB
      # 设置总上传的文件大小
      max-request-size: 20MB
  config:
    import: optional:classpath:chatclient/hybrid-retrieval.yml,optional:classpath:chatclient/route-polish.yml,optional:classpath:chatclient/profile-update.yml,optional:classpath:chatclient/map-route-invoker.yml,optional:classpath:chatclient/general-chat.yml,optional:classpath:chatclient/distinguish.yml
  # RabbitMQ 消息队列
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:admin}
    password: ${RABBITMQ_PASSWORD:admin}
    virtual-host: ${RABBITMQ_VHOST:/}
    listener:
      simple:
        concurrency: 5
        max-concurrency: 20
        prefetch: 1
        default-requeue-rejected: false
  ai:
    mcp:
      client:
        stdio:
          servers-configuration: classpath:/mcp-servers-config.json
        toolcallback:
          enabled: true
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:}
      chat:
        options:
          model: qwen-turbo
          temperature: 0.7
          top-p: 0.9
        memory:
          repository:
            redis:
              host: localhost
              port: 6380
              key-prefix: "chat:memory:"
              time-to-live: "24h"
      embedding:
        enabled: true
        options:
          model: text-embedding-v2
      audio:
        speech:
          # 使用通义语音合成模型 cosyvoice-v3-flash（最快模型）
          model: cosyvoice-v3-flash
          # 默认音色（可被 DigitalHumanConfig.ttsVoiceCode 覆盖）
          options:
            voice: longxia
            response-format: mp3
            speed: 1.0
            sample-rate: 22050

  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
  # 服务模块
  devtools:
    restart:
      # 热部署开关
      enabled: true
  data:
    # redis 配置
    redis:
      # 地址
      host: localhost
      # 端口，默认为6379
      port: 6379
      # 数据库索引
      database: 0
      # 密码
      password:
      # 连接超时时间
      timeout: 10s
      lettuce:
        pool:
          # 连接池中的最小空闲连接
          min-idle: 8
          # 连接池中的最大空闲连接
          max-idle: 32
          # 连接池的最大数据库连接数
          max-active: 64
          # 连接池最大阻塞等待时间
          max-wait: 500ms

# spring-file-storage（阿里云 OSS）
  file-storage:
    default-platform: aliyun-oss-1
    thumbnail-suffix: .min.jpg
    aliyun-oss:
      - platform: aliyun-oss-1
        endpoint: oss-cn-beijing.aliyuncs.com
        access-key: ${OSS_ACCESS_KEY:}
        secret-key: ${OSS_SECRET_KEY:}
        bucket-name: java-ai-c-z-h
        domain: https://java-ai-c-z-h.oss-cn-beijing.aliyuncs.com
        base-path: dkd-images/

# Redis Stack 向量检索（Redis Stack 镜像只有6379端口，RediSearch模块已加载）
redis:
  vectorstore:
    host: localhost
    port: 6379

# token配置
token:
  # 令牌自定义标识
  header: Authorization
  # 令牌密钥
  secret: jwt-secret-key-for-local-dev-only-12345678901234567890
  # 令牌有效期（默认30分钟）
  expireTime: 30

# MyBatis配置
mybatis:
  # 搜索指定包别名
  typeAliasesPackage: cn.edu.gdou.jingbanyou.**.domain
  # 配置mapper的扫描，找到所有的mapper.xml映射文件
  mapperLocations: classpath*:mapper/**/*Mapper.xml
  # 加载全局的配置文件
  configLocation: classpath:mybatis/mybatis-config.xml

# MyBatis-Plus配置（与MyBatis共存，manage模块使用）
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*Mapper.xml
  type-aliases-package: cn.edu.gdou.jingbanyou.**.domain
  global-config:
    db-config:
      id-type: auto

# PageHelper分页插件
pagehelper:
  helperDialect: mysql
  supportMethodsArguments: true
  params: count=countSql

# Springdoc配置
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    enabled: false  # 默认禁用，dev profile 需设置为 true 以启用 Swagger UI
    tags-sorter: alpha
  group-configs:
    - group: 'default'
      display-name: '测试模块'
      paths-to-match: '/**'
      packages-to-scan: cn.edu.gdou.jingbanyou.web.controller.tool

# 防盗链配置
referer:
  # 防盗链开关
  enabled: false
  # 允许的域名列表
  allowed-domains: localhost,127.0.0.1,ruoyi.vip,www.ruoyi.vip

# 景伴游 AI 配置
jingbanyou:
  ai:
    # RAG 预检阈值（0.0-1.0），低于此分数不命中 FAQ
    # text-embedding-v2 中文场景建议 0.55-0.65
    rag-precheck:
      threshold: 0.55
  faq:
    # FAQ 相似度阈值（0.0-1.0），低于此分数不命中 FAQ
    similarity-threshold: 0.75
  tourist:
    # ChatMemory TTL（分钟）
    chat-memory:
      ttl-minutes: 30
    # 熔断器配置
    circuit-breaker:
      # 失败率阈值（%）
      failure-rate-threshold: 50
      # 熔断打开后等待恢复时间（秒）
      wait-duration-in-open-state: 30
      # 慢调用阈值（秒）
      slow-call-duration-threshold: 10

# 防止XSS攻击
xss:
  # 过滤开关
  enabled: true
  # 排除链接（多个用逗号分隔）
  excludes: ""
  # 匹配链接
  urlPatterns: /system/*,/monitor/*,/tool/*

