# 项目相关配置
ruoyi:
  # 名称
  name: RuoYi
  # 版本
  version: 3.9.2
  # 版权年份
  copyrightYear: 2026
  # 文件路径 示例（ Windows配置D:/ruoyi/uploadPath，Linux配置 /home/ruoyi/uploadPath）
  profile: D:/ruoyi/uploadPath
  # 获取ip地址开关
  addressEnabled: false
  # 验证码类型 math 数字计算 char 字符验证
  captchaType: math

# 开发环境配置
server:
  # 服务器的HTTP端口，默认为8080
  port: 8081
  servlet:
    # 应用的访问路径
    context-path: /
  tomcat:
    # tomcat的URI编码
    uri-encoding: UTF-8
    # 连接数满后的排队数，默认为100
    accept-count: 1000
    threads:
      # tomcat最大线程数，默认为200
      max: 800
      # Tomcat启动初始化的线程数，默认值10
      min-spare: 100

# 日志配置
logging:
  level:
    cn.edu.gdou.jingbanyou: debug
    org.springframework: warn

# 用户配置
user:
  password:
    # 密码最大错误次数
    maxRetryCount: 5
    # 密码锁定时间（默认10分钟）
    lockTime: 10

# Spring配置
spring:
  main:
    allow-bean-definition-overriding: true
  # 资源信息
  messages:
    # 国际化资源文件路径
    basename: i18n/messages
  profiles:
    active: druid
  # 文件上传
  servlet:
    multipart:
      # 单个文件大小
      max-file-size: 10MB
      # 设置总上传的文件大小
      max-request-size: 20MB
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:sk-25a0e981c714438e85fe067faaf64295}
      chat:
        options:
          model: qwen-turbo
          temperature: 0.7
          top-p: 0.9
      embedding:
        enabled: true
        options:
          model: text-embedding-v2
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
  # 服务模块
  devtools:
    restart:
      # 热部署开关
      enabled: true
  data:
    # redis 配置
    redis:
      # 地址
      host: localhost
      # 端口，默认为6379
      port: 6379
      # 数据库索引
      database: 0
      # 密码
      password:
      # 连接超时时间
      timeout: 10s
      lettuce:
        pool:
          # 连接池中的最小空闲连接
          min-idle: 0
          # 连接池中的最大空闲连接
          max-idle: 8
          # 连接池的最大数据库连接数
          max-active: 8
          # #连接池最大阻塞等待时间（使用负值表示没有限制）
          max-wait: -1ms

# Redis Stack 向量检索（独立端口 6380，与 Spring Data Redis 分离）
redis:
  vectorstore:
    host: localhost
    port: 6380

# token配置
token:
  # 令牌自定义标识
  header: Authorization
  # 令牌密钥
  secret: abcdefghijklmnopqrstuvwxyz
  # 令牌有效期（默认30分钟）
  expireTime: 30

# AI节点配置（意图识别、路线规划、知识问答等）
jingbanyou:
  ai:
    distinguish:
      prompt: |
        你是一个景区智能导游助手的意图分类器。
        
        请根据游客的问题，结合历史对话上下文，将其分类为以下三类之一：
        
        - route_plan：游客想要规划游览路线，包含"怎么走""路线""从A到B""导航"等意图
        - spot_question：游客询问景区内具体景点、自然景观、动植物、历史背景、开放时间、门票等信息
        - complex_other：闲聊、投诉、建议、与景区无关的问题，或无法归入前两类的问题
        
        历史对话（最近3轮）：
        {history}
        
        当前游客问题：
        {question}
        
        请只输出分类标签，不要输出任何解释：
        route_plan 或 spot_question 或 complex_other
      model:
        name: qwen3.5-flash
        temperature: 0.1
        topP: 0.8
        maxTokens: 32
        responseFormat: JSON_OBJECT

# MyBatis配置
mybatis:
  # 搜索指定包别名
  typeAliasesPackage: cn.edu.gdou.jingbanyou.**.domain
  # 配置mapper的扫描，找到所有的mapper.xml映射文件
  mapperLocations: classpath*:mapper/**/*Mapper.xml
  # 加载全局的配置文件
  configLocation: classpath:mybatis/mybatis-config.xml

# MyBatis-Plus配置（与MyBatis共存，manage模块使用）
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*Mapper.xml
  type-aliases-package: cn.edu.gdou.jingbanyou.**.domain
  global-config:
    db-config:
      id-type: auto

# PageHelper分页插件
pagehelper:
  helperDialect: mysql
  supportMethodsArguments: true
  params: count=countSql

# Springdoc配置
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
  group-configs:
    - group: 'default'
      display-name: '测试模块'
      paths-to-match: '/**'
      packages-to-scan: cn.edu.gdou.jingbanyou.web.controller.tool

# 防盗链配置
referer:
  # 防盗链开关
  enabled: false
  # 允许的域名列表
  allowed-domains: localhost,127.0.0.1,ruoyi.vip,www.ruoyi.vip

# 防止XSS攻击
xss:
  # 过滤开关
  enabled: true
  # 排除链接（多个用逗号分隔）
  excludes: /system/notice
  # 匹配链接
  urlPatterns: /system/*,/monitor/*,/tool/*

